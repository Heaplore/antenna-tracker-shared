  <p class="lede">传统天线就像一盏灯泡，通电后向四面八方发光，想让它定向照射就得加个反光碗（抛物面）。  超表面天线则像一块"智能调光玻璃"——本身不发光，但能让穿过它的每一束光在特定方向上叠加增强。这块"玻璃"的每一小块都可以独立编程控制，想让它把电磁波往哪边打就往哪边打。</p>

<script>
/* 瀑布流贪心分列：哪边短下一个卡片就放哪边 */
(function(){
  if (window.innerWidth <= 760) return;  /* 窄屏走单列堆叠 */
  var main = document.querySelector('main');
  if (!main) return;
  var leftCol  = main.querySelector('.col-left');
  var rightCol = main.querySelector('.col-right');
  if (!leftCol || !rightCol) return;
  /* 收集 main 下所有 article.card（还没搬到 .masonry-col 里的） */
  var cards = Array.prototype.slice.call(main.querySelectorAll('article.card'));
  /* 贪心：哪边矮 append 到哪边 */
  cards.forEach(function(card){
    var lH = leftCol.offsetHeight;
    var rH = rightCol.offsetHeight;
    (lH <= rH ? leftCol : rightCol).appendChild(card);
  });
  main.classList.add('masonry-ready');
})();
</script>
