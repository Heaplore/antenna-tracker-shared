name: Market Weekly Report

on:
  # Every Monday 09:00 Beijing time (01:00 UTC)
  schedule:
    - cron: "0 1 * * 1"
  # Allow manual trigger for testing
  workflow_dispatch:
  # Allow re-running after data update
  repository_dispatch:

permissions:
  contents: write

jobs:
  generate-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate weekly banner + report
        run: python scripts/generate_banner_report.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/_data/market.json docs/market-weekly.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          WEEK=$(date -u +%G-W%V)
          git commit -m "chore(market): regenerate weekly banner for ${WEEK}"
          git push