name: Deploy to GitHub Pages

# 统一时间: 每天 14:30 (Asia/Shanghai) = 06:30 UTC
# 触发路径: daily-data-update.yml 跑完数据更新后, 在最后一步 'Trigger GitHub Pages deploy'
#           通过 gh workflow run deploy-pages.yml 触发本 workflow
# 不再监听 push main hook (避免双部署)
# 不再设独立 schedule (统一在 daily 14:30 一次完成)
on:
  workflow_dispatch:
    # 手动触发, 由 daily-data-update.yml 在 data 更新后调用
  workflow_call:
    # 支持被其他 workflow 调用

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Python (no deps, daily-data-update already ran analysis)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          set -e
          echo "Running next build (analysis already done by daily-data-update)..."
          npm run build
          echo "Build complete!"
          ls -la out/

      - name: Verify output
        run: |
          echo "Checking out/ directory..."
          ls -la out/ || echo "out/ not found!"
          ls -la out/*.html | head -20

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: '${{ steps.deployment.outputs.page_url }}'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
