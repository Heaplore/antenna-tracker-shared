name: Deploy to GitHub Pages

# 触发路径:
#   1. push main → 自动构建部署（前端代码变更立即生效）
#   2. workflow_dispatch → 手动触发
#   3. workflow_call → 被其他 workflow 调用
on:
  push:
    branches: [main]
  workflow_dispatch:
    # 手动触发, 由 daily-data-update.yml 在 data 更新后调用
  workflow_call:
    # 支持被其他 workflow 调用

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Python (no deps, daily-data-update already ran analysis)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          set -e
          echo "Running next build (analysis already done by daily-data-update)..."
          npm run build
          echo "Build complete!"
          ls -la out/

      - name: Copy static HTML assets to out/
        run: |
          set -e
          echo "Copying public/kg-cards-rendered/ to out/kg-cards-rendered/..."
          mkdir -p out/kg-cards-rendered
          cp -r public/kg-cards-rendered/* out/kg-cards-rendered/
          echo "Copying public/data/ to out/data/..."
          mkdir -p out/data
          cp -r public/data/* out/data/
          echo "Copied $(ls out/kg-cards-rendered/ | wc -l) HTML files"
          echo "Copied $(ls out/data/ | wc -l) data files"
          ls out/kg-cards-rendered/ | head -5
          ls out/data/

      - name: Verify output
        run: |
          echo "Checking out/ directory..."
          ls -la out/ || echo "out/ not found!"
          ls -la out/*.html | head -20

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: '${{ steps.deployment.outputs.page_url }}'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
