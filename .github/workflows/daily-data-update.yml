name: Daily Data Update

on:
  schedule:
    # 每天 14:30 (Asia/Shanghai) = 06:30 UTC 运行
    - cron: '30 6 * * *'
  workflow_dispatch:
    # 支持手动触发

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.11'
  FETCH_TIMEOUT: '600'
  # enrich_kg_metadata.py 用 MMX CLI; GH Actions 装 node 20 默认路径
  # 注意: 实际路径取决于 mmx-cli 包安装位置, 这里用常见的 npm global path
  # enrich 失败时 daily 软失败 (echo continue), 不阻塞数据流
  NODE_EXE: '/usr/bin/node'
  MMX_MJS: '/usr/lib/node_modules/mmx-cli/dist/mmx.mjs'

permissions:
  contents: write
  actions: write  # 允许调 gh workflow run deploy-pages.yml
  issues: write   # standards notify step 开 issue 通知 review/audit

concurrency:
  group: daily-data
  cancel-in-progress: true

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests || echo "requests not installed, continue with stdlib only"

      # ----------------------------------------------------------------
      # Day-of-week check (Asia/Shanghai)
      # %u: 1=Monday ... 7=Sunday
      # ----------------------------------------------------------------
      - name: Check day of week (CST)
        id: dow-check
        run: |
          DOW_CST=$(TZ='Asia/Shanghai' date +%u)
          echo "dow_cst=$DOW_CST" >> $GITHUB_OUTPUT
          if [ "$DOW_CST" = "1" ]; then
            echo "is_monday=true" >> $GITHUB_OUTPUT
          else
            echo "is_monday=false" >> $GITHUB_OUTPUT
          fi

      # ----------------------------------------------------------------
      # 每天必跑: 7 个数据更新脚本
      # ----------------------------------------------------------------
      - name: Run fetch-real-data.py (news / companies / KG raw)
        run: timeout ${{ env.FETCH_TIMEOUT }} python scripts/fetch-real-data.py || echo "fetch-real-data failed, continue"
        shell: bash

      - name: Run update_prices_metals.py (27 种 BOM 材料价格)
        run: python scripts/update_prices_metals.py || echo "update_prices_metals failed, continue"
        shell: bash

      - name: Run update_all_prices.py (实时铜/铝/钢价采集)
        run: timeout ${{ env.FETCH_TIMEOUT }} python scripts/update_all_prices.py || echo "update_all_prices failed, continue"
        shell: bash

      - name: Run bump_technology.py (技术时间线)
        run: python scripts/bump_technology.py || echo "bump_technology failed, continue"
        shell: bash

      # update_companies.py 已从 daily 必跑移出:
      #   1) 是手工数据补全工具 (一次性加 tier3/4/5/7 entries), 写死 lastUpdate=2026-05-31
      #   2) 不该 cron 化 — 跑一次内容就完, 重复跑浪费 LLM token
      #   3) 手工执行: python scripts/update_companies.py (已改相对路径)

      - name: Run enrich_kg_metadata.py (知识图谱元数据, 软失败)
        run: python scripts/enrich_kg_metadata.py || echo "enrich_kg_metadata failed (likely missing MMX CLI), continue"
        shell: bash
        env:
          NODE_EXE: ${{ env.NODE_EXE }}
          MMX_MJS: ${{ env.MMX_MJS }}

      - name: Run build_insights.py (派生式 dashboard, 无 LLM 兜底)
        # 派生自 prices / news / standards / market / technology, 保证首页始终有内容
        # 即使后续 LLM 步骤全失败也不为空
        run: python scripts/build_insights.py || echo "build_insights failed, continue"
        shell: bash

      # ----------------------------------------------------------------
      # 周一专属: market 周报 + standards 自动抓取
      # ----------------------------------------------------------------
      - name: Generate market weekly banner (周一)
        if: steps.dow-check.outputs.is_monday == 'true'
        run: python scripts/generate_banner_report.py || echo "generate_banner_report failed, continue"
        shell: bash

      - name: Run auto_fetch_standards.py (daily, auto-apply)
        # 全自动 apply: --apply 会 idempotent append 候选到 standards.json,
        # 0 candidates 时不动 baseline.
        run: |
          echo "==[standards auto-apply]$(date -u +'%Y-%m-%dT%H:%M:%SZ')=="
          timeout 600 python scripts/auto_fetch_standards.py --write --apply || echo "auto_fetch_standards failed, continue"
          if [ -f scripts/standards_candidates.json ]; then
            COUNT=$(python3 -c "import json; print(len(json.load(open('scripts/standards_candidates.json')).get('candidates', [])))" 2>/dev/null || echo "0")
            echo "candidates_count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "candidates_count=0" >> $GITHUB_OUTPUT
          fi
        id: standards-dry-run
        shell: bash

      - name: Notify on new standards candidates (daily audit log)
        # 每都开一个 issue 供 review; 0 candidates 时也开一条空 issue 作为审计轨迹
        if: steps.standards-dry-run.outputs.candidates_count != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'scripts/standards_candidates.json';
            let wrapper;
            try {
              const raw = fs.readFileSync(path, 'utf8');
              wrapper = JSON.parse(raw);
            } catch (err) {
              core.warning(`standards_candidates.json 读取/解析失败 (跳过 issue 创建): ${err.message}`);
              return;
            }
            // candidates.json 结构: {generatedAt, baselineLastUpdate, stats, candidates: [...], apply_result?: {...}}
            const data = Array.isArray(wrapper) ? wrapper : (Array.isArray(wrapper.candidates) ? wrapper.candidates : []);
            const stats = wrapper.stats || {};
            const applyAdded = (wrapper.apply_result && typeof wrapper.apply_result.added === 'number') ? wrapper.apply_result.added : -1;
            const lines = [
              '### 天线行业标准 · 自动抓取汇总',
              '',
              `**抓取时间**: ${wrapper.generatedAt || new Date().toISOString()}`,
              `**baseline lastUpdate**: ${wrapper.baselineLastUpdate || '?'}`,
              `**3GPP 页面发现**: ${stats['3gpp_page_releases'] || 0} 个 Release`,
              `**候选总数**: ${data.length} 条`,
              `**本次实际 apply 新增**: ${applyAdded < 0 ? '未取样' : applyAdded} 条`,
              '',
            ];
            for (const r of data) {
              lines.push(`- **${r.name}** · ${r.organization} · ${r.publishDate || r.frozenDate || '-'}`);
              if (r.url) lines.push(`  - URL: ${r.url}`);
              if (r.description) lines.push(`  - desc: ${r.description}`);
            }
            if (data.length === 0) lines.push('_(0 候选, baseline 已 idempotent) _');
            lines.push('', '---', '', '> 自动 apply 写入 public/data/standards.json + app/_data/standards.json; 无需人工 review');
            const title = (applyAdded > 0)
              ? `standards: 自动 apply 新增 ${applyAdded} 条 (${data.length} 候选)`
              : `standards: 每日扫描 0 新增 (${data.length} 候选)`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: lines.join('\n'),
              labels: ['standards-candidates', 'auto-fetch'],
            });
            core.info('已创建 Issue 通知 review/audit');

      - name: Upload standards candidates artifact (daily)
        uses: actions/upload-artifact@v4
        with:
          name: standards-candidates
          path: scripts/standards_candidates.json
          if-no-files-found: warn
          retention-days: 90

      # ----------------------------------------------------------------
      # Commit + Push (修坑 22: git add -A 改 add -u, 排除 untracked 避免 CRLF/LF 冲突)
      # ----------------------------------------------------------------
      - name: Check for changes
        id: git-status
        run: |
          if git diff --stat | grep -q ' [0-9]'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes to main
        if: steps.git-status.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # 用 add -u 而不是 add -A,避免未跟踪的 CRLF/LF 临时文件污染 commit
          # 周一周报如果生成 docs/market-weekly.md 这种新文件, 需要单独 git add
          git add -u
          # 周一周报可能产生新的 docs/market-weekly.md
          if [ "${{ steps.dow-check.outputs.is_monday }}" = "true" ]; then
            git add docs/market-weekly.md 2>/dev/null || true
          fi
          if git diff --cached --quiet; then
            echo "No staged changes, skip commit"
            exit 0
          fi
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          WEEK_TAG=""
          if [ "${{ steps.dow-check.outputs.is_monday }}" = "true" ]; then
            WEEK=$(date -u +%G-W%V)
            WEEK_TAG=" [week=$WEEK]"
          fi
          git commit -m "data: auto update $TIMESTAMP$WEEK_TAG"
          git pull --rebase origin main || {
            echo "Rebase conflict, falling back to merge"
            git rebase --abort || true
            git pull --no-rebase origin main
          }
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # deploy-pages.yml 已监听 push main, 自动触发无需显式调用
      # 保留此注释供后续维护者理解为何删除了 gh workflow run
      # ----------------------------------------------------------------
