name: Daily Data Update

on:
  schedule:
    # 每天 14:30 (Asia/Shanghai) = 06:30 UTC 运行
    - cron: '30 6 * * *'
  workflow_dispatch:
    # 支持手动触发

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  FETCH_TIMEOUT: '600'

permissions:
  contents: write
  actions: write  # 允许调 gh workflow run deploy-pages.yml

concurrency:
  group: daily-data
  cancel-in-progress: true

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests || echo "requests not installed, continue with stdlib only"

      # ----------------------------------------------------------------
      # Day-of-week check (Asia/Shanghai)
      # %u: 1=Monday ... 7=Sunday
      # ----------------------------------------------------------------
      - name: Check day of week (CST)
        id: dow-check
        run: |
          DOW_CST=$(TZ='Asia/Shanghai' date +%u)
          echo "dow_cst=$DOW_CST" >> $GITHUB_OUTPUT
          if [ "$DOW_CST" = "1" ]; then
            echo "is_monday=true" >> $GITHUB_OUTPUT
          else
            echo "is_monday=false" >> $GITHUB_OUTPUT
          fi

      # ----------------------------------------------------------------
      # 每天必跑: 7 个数据更新脚本
      # ----------------------------------------------------------------
      - name: Run fetch-real-data.py (news / companies / KG raw)
        run: timeout ${{ env.FETCH_TIMEOUT }} python scripts/fetch-real-data.py || echo "fetch-real-data failed, continue"
        shell: bash

      - name: Run summarize_news.py (LLM 摘要补全)
        run: python scripts/summarize_news.py || echo "summarize_news failed, continue"
        shell: bash
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

      - name: Run update_prices_metals.py (27 种 BOM 材料价格)
        run: python scripts/update_prices_metals.py || echo "update_prices_metals failed, continue"
        shell: bash

      - name: Run bump_technology.py (技术时间线)
        run: python scripts/bump_technology.py || echo "bump_technology failed, continue"
        shell: bash

      - name: Run update_companies.py (企业数据)
        run: python scripts/update_companies.py || echo "update_companies failed, continue"
        shell: bash

      - name: Run enrich_kg_metadata.py (知识图谱元数据)
        run: python scripts/enrich_kg_metadata.py || echo "enrich_kg_metadata failed, continue"
        shell: bash

      - name: Run generate-analysis.py (四维交叉分析)
        run: |
          if [ -n "$AGNES_API_KEY" ]; then
            echo "AGNES_API_KEY 已配置,运行四维分析..."
            timeout 600 python scripts/generate-analysis.py || echo "generate-analysis failed, continue"
          else
            echo "AGNES_API_KEY 未配置,跳过四维分析"
          fi
        shell: bash
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

      # ----------------------------------------------------------------
      # 周一专属: market 周报 + standards 自动抓取
      # ----------------------------------------------------------------
      - name: Generate market weekly banner (周一)
        if: steps.dow-check.outputs.is_monday == 'true'
        run: python scripts/generate_banner_report.py || echo "generate_banner_report failed, continue"
        shell: bash

      - name: Run auto_fetch_standards.py (dry-run, 仅周一)
        if: steps.dow-check.outputs.is_monday == 'true'
        run: |
          echo "==[standards dry-run, 周一自动]$(date -u +'%Y-%m-%dT%H:%M:%SZ')=="
          timeout 600 python scripts/auto_fetch_standards.py --write || echo "auto_fetch_standards failed, continue"
          if [ -f scripts/standards_candidates.json ]; then
            COUNT=$(python3 -c "import json; print(len(json.load(open('scripts/standards_candidates.json'))))" 2>/dev/null || echo "0")
            echo "candidates_count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "candidates_count=0" >> $GITHUB_OUTPUT
          fi
        id: standards-dry-run
        shell: bash

      - name: Notify on new standards candidates (周一)
        if: |
          steps.dow-check.outputs.is_monday == 'true' &&
          steps.standards-dry-run.outputs.candidates_count != '0' &&
          steps.standards-dry-run.outputs.candidates_count != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('scripts/standards_candidates.json', 'utf8'));
            const lines = ['### 天线行业标准 · 自动抓取候选项', '', `**抓取时间**: ${new Date().toISOString()}`, `**候选数量**: ${data.length}`, ''];
            for (const r of data) {
              lines.push(`- **${r.name}** · ${r.organization} · ${r.publishDate || r.frozenDate || '-'}`);
              lines.push(`  - URL: ${r.url}`);
              if (r.description) lines.push(`  - desc: ${r.description}`);
            }
            lines.push('', '---', '', '> Review / merge: 见 `scripts/_apply_candidates.py` (手动 dry-run + apply)');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'standards: 新增候选 ' + data.length + ' 条待 review',
              body: lines.join('\n'),
              labels: ['standards-candidates', 'auto-fetch'],
            });
            core.info('已创建 Issue 通知 review');

      - name: Upload standards candidates artifact (周一)
        if: steps.dow-check.outputs.is_monday == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: standards-candidates
          path: scripts/standards_candidates.json
          if-no-files-found: warn
          retention-days: 90

      # ----------------------------------------------------------------
      # Commit + Push (修坑 22: git add -A 改 add -u, 排除 untracked 避免 CRLF/LF 冲突)
      # ----------------------------------------------------------------
      - name: Check for changes
        id: git-status
        run: |
          if git diff --stat | grep -q ' [0-9]'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes to main
        if: steps.git-status.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # 用 add -u 而不是 add -A,避免未跟踪的 CRLF/LF 临时文件污染 commit
          # 周一周报如果生成 docs/market-weekly.md 这种新文件, 需要单独 git add
          git add -u
          # 周一周报可能产生新的 docs/market-weekly.md
          if [ "${{ steps.dow-check.outputs.is_monday }}" = "true" ]; then
            git add docs/market-weekly.md 2>/dev/null || true
          fi
          if git diff --cached --quiet; then
            echo "No staged changes, skip commit"
            exit 0
          fi
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          WEEK_TAG=""
          if [ "${{ steps.dow-check.outputs.is_monday }}" = "true" ]; then
            WEEK=$(date -u +%G-W%V)
            WEEK_TAG=" [week=$WEEK]"
          fi
          git commit -m "data: auto update $TIMESTAMP$WEEK_TAG"
          git pull --rebase origin main || {
            echo "Rebase conflict, falling back to merge"
            git rebase --abort || true
            git pull --no-rebase origin main
          }
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 触发 deploy (build + push GitHub Pages)
      # ----------------------------------------------------------------
      - name: Trigger GitHub Pages deploy
        if: steps.git-status.outputs.has_changes == 'true'
        run: |
          echo "Triggering deploy-pages workflow..."
          gh workflow run deploy-pages.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
