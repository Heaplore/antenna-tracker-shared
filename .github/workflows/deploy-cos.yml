name: Deploy to COS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run export

      - name: Configure coscmd
        run: |
          pip install coscmd
          coscmd config -a ${{ secrets.COS_SECRET_ID }} -s ${{ secrets.COS_SECRET_KEY }} -b jingtaiwangzhan-1439312660 -r ap-guangzhou

      - name: Upload to COS
        run: |
          coscmd upload -r out/ /
          echo "Deployment complete!"
