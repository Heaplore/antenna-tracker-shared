name: Auto Update Data

on:
  schedule:
    # 每天下午 14:30 (Asia/Shanghai) = 06:30 UTC 运行
    - cron: '30 6 * * *'
  workflow_dispatch:
    # 支持手动触发

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  FETCH_TIMEOUT: '600'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # fetch-real-data.py 仅用标准库, 但保留以备将来扩展
          pip install requests || echo "requests not installed, continue with stdlib only"

      - name: Run fetch-real-data.py
        run: timeout ${{ env.FETCH_TIMEOUT }} python scripts/fetch-real-data.py || echo "fetch-real-data failed, continue"
        shell: bash

      - name: Run fill_summaries.py (补全缺失摘要)
        run: python scripts/fill_summaries.py || echo "fill_summaries failed, continue"
        shell: bash

      - name: Run update_prices_metals.py (金属价格自动更新)
        run: python scripts/update_prices_metals.py || echo "update_prices_metals failed, continue"
        shell: bash

      - name: Run bump_technology.py
        run: python scripts/bump_technology.py || echo "bump_technology failed, continue"
        shell: bash

      - name: Run generate-analysis.py (四维交叉分析)
        run: |
          if [ -n "$AGNES_API_KEY" ]; then
            echo "AGNES_API_KEY 已配置,运行四维分析..."
            timeout 600 python scripts/generate-analysis.py || echo "generate-analysis failed, continue"
          else
            echo "AGNES_API_KEY 未配置,跳过四维分析"
          fi
        shell: bash
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

      - name: Check if today is Monday (CST)
        id: dow-check
        run: |
          DOW_CST=$(TZ='Asia/Shanghai' date +%u)
          echo "dow_cst=$DOW_CST" >> $GITHUB_OUTPUT
          if [ "$DOW_CST" = "1" ]; then
            echo "is_monday=true" >> $GITHUB_OUTPUT
          else
            echo "is_monday=false" >> $GITHUB_OUTPUT
          fi

      - name: Run auto_fetch_standards.py (dry-run, 仅周一)
        # 仅 Asia/Shanghai 周一执行, 其他天跳过 (零开销)
        if: steps.dow-check.outputs.is_monday == 'true'
        run: |
          echo "==[standards dry-run, 周一自动]$(date -u +'%Y-%m-%dT%H:%M:%SZ')=="
          timeout 600 python scripts/auto_fetch_standards.py --write || echo "auto_fetch_standards failed, continue"
          if [ -f scripts/standards_candidates.json ]; then
            COUNT=$(python3 -c "import json; print(len(json.load(open('scripts/standards_candidates.json'))))" 2>/dev/null || echo "0")
            echo "candidates_count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "candidates_count=0" >> $GITHUB_OUTPUT
          fi
        id: standards-dry-run
        shell: bash

      - name: Notify on new standards candidates
        if: |
          steps.standards-dry-run.outputs.candidates_count != '0' &&
          steps.standards-dry-run.outputs.candidates_count != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('scripts/standards_candidates.json', 'utf8'));
            const lines = ['### 天线行业标准 · 自动抓取候选项', '', `**抓取时间**: ${new Date().toISOString()}`, `**候选数量**: ${data.length}`, ''];
            for (const r of data) {
              lines.push(`- **${r.name}** · ${r.organization} · ${r.publishDate || r.frozenDate || '-'}`);
              lines.push(`  - URL: ${r.url}`);
              if (r.description) lines.push(`  - desc: ${r.description}`);
            }
            lines.push('', '---', '', '> Review / merge: 见 `scripts/_apply_candidates.py` (手动 dry-run + apply)');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'standards: 新增候选 ' + data.length + ' 条待 review',
              body: lines.join('\n'),
              labels: ['standards-candidates', 'auto-fetch'],
            });
            core.info('已创建 Issue 通知 review');

      - name: Check for changes
        id: git-status
        run: |
          if git diff --stat | grep -q ' [0-9]'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes to main
        if: steps.git-status.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          git commit -m "data: auto update $TIMESTAMP"
          # Sync main then rebase to avoid non-fast-forward push
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload standards candidates artifact (周一)
        if: steps.dow-check.outputs.is_monday == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: standards-candidates
          path: scripts/standards_candidates.json
          if-no-files-found: warn
          retention-days: 90
